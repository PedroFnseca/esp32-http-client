site_name: ESP32-HTTP-Client
site_url: https://pedrofnseca.github.io/esp32-http-client
site_description: ESP32 HTTP client library designed for embedded applications, featuring a fluent API, efficient memory usage, and direct JSON handling.
site_author: Pedro Fonseca
repo_name: PedroFnseca/esp32-http-client
repo_url: https://github.com/PedroFnseca/esp32-http-client
edit_uri: ""

extra:
  analytics:
    provider: google
    property: G-TFXJLYGKZM
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/PedroFnseca/esp32-http-client/
      name: GitHub Repository

theme:
  custom_dir: overrides
  icon:
    logo: material/memory
  name: material
  palette:
    - scheme: slate
      primary: teal
      accent: orange
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

    - scheme: default
      primary: teal
      accent: orange
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  font:
    text: Inter
    code: Cascadia Code
  features:
    - navigation.top
    - navigation.indexes
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - toc.follow

markdown_extensions:
  - admonition
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

plugins:
  - search
  - tags
  - git-revision-date-localized
  - social:
      cards_layout_options:
        background_color: "#00897B"
        background_image: docs/assets/preview.png
        description: ESP32 HTTP client library designed for embedded applications, featuring a fluent API, efficient memory usage, and direct JSON handling.

extra_javascript:
  - javascripts/extra.js

nav:
  - Home: index.md
  - Getting Started:
    - getting-started/index.md
    - Installation: getting-started/installation.md
    - Quick Start: getting-started/quickstart.md
  - Guide:
    - guide/index.md
    - Initialization: guide/initialization.md
    - Making Requests: guide/requests.md
    - Reading Responses: guide/responses.md
    - Advanced Usage: guide/advanced.md
  - Examples:
    - examples/index.md
    - Simple GET: examples/simple-get.md
    - POST Request: examples/post-request.md
    - Nested JSON: examples/nested-json.md
    - Array JSON: examples/array-json.md
    - Raw JSON: examples/raw-json.md
    - PUT & DELETE: examples/put-delete.md
    - Unix Timestamp: examples/unix-timestamp.md
    - Custom Port: examples/port-selection.md
  - API Reference:
    - api/index.md
    - ESP32HTTPClient: api/esp32httpclient.md
    - RestRequest: api/restrequest.md
  - Performance: performance.md
  - Repository: https://github.com/PedroFnseca/esp32-http-client/
  - Releases: https://github.com/PedroFnseca/esp32-http-client/releases

