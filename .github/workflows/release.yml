name: Release

on:
  push:
    branches:
      - main

jobs:
  release:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read version from library.properties
        id: version
        run: |
          VERSION=$(grep '^version=' library.properties | cut -d'=' -f2 | xargs)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Check if tag exists
        id: tag
        run: |
          TAG="v${{ steps.version.outputs.version }}"

          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Create tag
        if: steps.tag.outputs.exists == 'false'
        run: |
          TAG="v${{ steps.version.outputs.version }}"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git tag "$TAG"
          git push origin "$TAG"

      - name: Generate Release Notes
        if: steps.tag.outputs.exists == 'false'
        run: |
          PREVIOUS_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")

          if [ -z "$PREVIOUS_TAG" ]; then
            RANGE="HEAD"
          else
            RANGE="$PREVIOUS_TAG..HEAD"
          fi

          echo "# What's Changed" > RELEASE_NOTES.md
          echo "" >> RELEASE_NOTES.md

          create_section() {
            TITLE="$1"
            PREFIX="$2"

            COMMITS=$(git log $RANGE --pretty=format:"%s (%h)" \
              | grep "^$PREFIX:" \
              | sed "s/^$PREFIX: /- /")

            if [ -n "$COMMITS" ]; then
              echo "## $TITLE" >> RELEASE_NOTES.md
              echo "" >> RELEASE_NOTES.md
              echo "$COMMITS" >> RELEASE_NOTES.md
              echo "" >> RELEASE_NOTES.md
            fi
          }

          create_section "Features" "feat"
          create_section "Bug Fixes" "fix"
          create_section "Performance Improvements" "perf"
          create_section "Documentation" "docs"
          create_section "Code Refactoring" "refactor"
          create_section "Tests" "test"
          create_section "Styles" "style"

          CHORES=$(git log $RANGE --pretty=format:"%s (%h)" \
            | grep "^chore:" \
            | grep -v "bump version" \
            | sed 's/^chore: /- /')

          if [ -n "$CHORES" ]; then
            echo "## Miscellaneous Chores" >> RELEASE_NOTES.md
            echo "" >> RELEASE_NOTES.md
            echo "$CHORES" >> RELEASE_NOTES.md
            echo "" >> RELEASE_NOTES.md
          fi

          if [ -n "$PREVIOUS_TAG" ]; then
            echo "---" >> RELEASE_NOTES.md
            echo "" >> RELEASE_NOTES.md
            echo "**Full Changelog:** https://github.com/${{ github.repository }}/compare/${PREVIOUS_TAG}...v${{ steps.version.outputs.version }}" >> RELEASE_NOTES.md
          fi

      - name: Create GitHub Release
        if: steps.tag.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          body_path: RELEASE_NOTES.md
