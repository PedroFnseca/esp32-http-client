name: Unit Tests

on:
  push:
  pull_request:

permissions:
  contents: write

jobs:
  test:
    name: Run host unit tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Ensure compiler is available
        run: |
          g++ --version

      - name: Build and run tests
        env:
          FORCE_COLOR: "1"
        run: |
          # Capture output to extract coverage
          sh tests/run_tests.sh | tee test_output.txt
          
          # Parse the coverage percentage
          COVERAGE=$(grep -oP 'Source line coverage \(src\): \K[0-9.]+' test_output.txt || echo "0.00")
          echo "COVERAGE=$COVERAGE" >> $GITHUB_ENV

      - name: Update Coverage Badge in README
        if: github.ref == 'refs/heads/main'
        run: |
          COVERAGE=${{ env.COVERAGE }}
          
          # Determine badge color based on coverage %
          COLOR="red"
          if awk "BEGIN {exit !($COVERAGE >= 80)}"; then
            COLOR="brightgreen"
          elif awk "BEGIN {exit !($COVERAGE >= 60)}"; then
            COLOR="yellow"
          fi
          
          # Replace the badge URL in README.md
          sed -i "s|https://img.shields.io/badge/Coverage-[0-9.]*%25-[a-zA-Z]*|https://img.shields.io/badge/Coverage-${COVERAGE}%25-${COLOR}|g" README.md

          sed -i "s|https://img.shields.io/badge/Coverage-[0-9.]*%25-[a-zA-Z]*|https://img.shields.io/badge/Coverage-${COVERAGE}%25-${COLOR}|g" docs/index.md

      - name: Commit and Push Badge Update
        if: github.ref == 'refs/heads/main'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "docs: auto-update coverage badge"
          file_pattern: README.md docs/index.md
